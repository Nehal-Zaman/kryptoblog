{% extends 'base.html' %}

{% block content %}
    <h2>Unlock: {{ slug }}</h2>
    <p>This writeup is encrypted. Prove you rooted the box.</p>
    
    {% if error %}<p style="color: var(--error-color);">{{ error }}</p>{% endif %}
    
    <form method="POST">
        <input type="password" name="passphrase" placeholder="Enter flag..." required>
        <button type="submit">Decrypt</button>
    </form>
{% endblock %}
