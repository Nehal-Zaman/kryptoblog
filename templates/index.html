{% extends 'base.html' %}

{% block content %}
    <h2>Available Writeups</h2>
    <ul style="list-style-type: none; padding: 0;">
        {% for post in posts %}
            <li style="margin-bottom: 10px;">
                <a href="{{ url_for('view_post', slug=post['slug']) }}">
                    > {{ post['title'] }} 
                    {% if post['is_encrypted'] %}
                        <span style="color: var(--error-color); font-size: 0.8em; margin-left: 5px;">[LOCKED]</span>
                    {% else %}
                        <span style="color: var(--accent-color); font-size: 0.8em; margin-left: 5px;">[PUBLIC]</span>
                    {% endif %}
                </a>
            </li>
        {% else %}
            <li>No writeups available yet.</li>
        {% endfor %}
    </ul>
{% endblock %}
